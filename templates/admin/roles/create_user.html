{% load i18n %}
{% load static %}

<style>
    .create-form-margin{
        margin-bottom: -5px;
    }
</style>

<div id="add-user" class="popup mfp-with-anim mfp-hide" style='background-color: white; width:100%;max-width: 550px; margin-left: auto; margin-right: auto; vertical-align:center; '>
    <div class="popup-body "  style="margin-left: 3em; margin-right: 3em; padding-bottom: 0.3rem; padding-top: 0.3rem;">
        <div class="modal-header mb-2">
            <div class="justify-content-center">
                <h5 class="modal-title ">Create {{user_role|title}}</h5>
            </div>
            <button type="button" style="font-size: 25px;" class="close" data-dismiss="modal" aria-label="Close" id="closebutton">
                <span aria-hidden="true">&times;</span>
              </button>   
        </div>

        <div class="">
            <form id="create-user-form" enctype="multipart/form-data">
                <input type="hidden" name="redirect_url" value="{{ request.build_absolute_uri }}">
                {% csrf_token %}

                <div class="form-group create-form-margin">
                    <span class="font-weight-bold ml-1">{% trans "Username" %}</span>
                    <div class="input-group input-group-rounded" id="username-input">
                        <input type="text" class="form-control" name="username" id="username" autocomplete="new-username" placeholder="Enter Username" required>
                        <p class="error-msg"></p>
                    </div>
                </div>
                <div class="form-group create-form-margin">
                    <span class="font-weight-bold ml-1">{% trans "Full Name" %}</span>
                    <div class="input-group input-group-rounded" id="full_name-input">
                        <input type="text" class="form-control" name="full_name" id="full_name" placeholder="Enter Full Name" required>
                        <p class="error-msg"></p>
                    </div>
                </div>
                <div class="form-group create-form-margin">
                    <span class="font-weight-bold ml-1">{% trans "Password" %}</span>
                    <div class="input-group input-group-rounded" id="password-input">
                        <input type="password" class="form-control" name="password" id="id_password" autocomplete="new-password" placeholder="Enter Password" required>
                        <span class="input-group-text" id="password-toggle" onclick="view_password('create-user-form', 'id_password', this.id)">
                            <i class="fa fa-eye toggle-icon" title="View/Hide Password" style="cursor:pointer;"></i>
                        </span>
                        <p class="error-msg"></p>
                    </div>
                </div> 
                <div class="form-group create-form-margin">
                    <span class="font-weight-bold ml-1">{% trans "Confirm Password" %}</span>
                    <div class="input-group input-group-rounded" id="confirm-password-input">
                        <input type="password" class="form-control" name="confirm-password" id="confirm-password" placeholder="Enter Confirm Password" required>
                        <span class="input-group-text" id="password-toggle" onclick="view_password('create-user-form', 'confirm-password', this.id)">
                            <i class="fa fa-eye toggle-icon" title="View/Hide Password" style="cursor:pointer;"></i>
                        </span>
                        <p class="error-msg"></p>
                    </div>
                </div>
                <div class="pt-2">
                    <button type="submit" class="btn btn-primary btn-md btn-block waves-effect waves-light text-center m-b-20" id="create-user-button">
                        {% trans "Create" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    $('#closebutton').on( "click", function() {
        $.magnificPopup.close();
    });
</script>
